name: Output sharing from steps to next jobs:
on: push
  
jobs:
  outputs:
    version: ${{ steps.step1.outputs.version }}
  build:
    runs-on: ubuntu-latest
    steps:
      - name: step one - output
        id: step1
        run: echo "version=1.0.2" >> $GITHUB_OUTPUT

  deploy:
     runs-on: ubuntu-latest
     needs: build
     steps:
     - name: Deploy the app
       run: echo "We are deploying the app version is ${{ needs.build.outputs.version }} "
